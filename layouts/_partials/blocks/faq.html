{{ $isStacked := eq .Params.layout "stacked" }}
<section id="{{ .Params.id | default "faq" }}" class="scroll-mt-32 bg-mist/70 py-20 lg:py-24">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="{{ if $isStacked }}space-y-10{{ else }}grid gap-10 lg:grid-cols-[0.8fr_1.2fr] lg:items-start{{ end }}">
      <div>
        {{ with .Params.eyebrow }}
          <p class="text-[0.74rem] font-bold tracking-[0.22em] text-amber uppercase">{{ . }}</p>
        {{ end }}
        {{ with .Params.heading }}
          <h2 class="mt-4 text-4xl font-extrabold tracking-[-0.04em] text-deep sm:text-5xl">{{ . }}</h2>
        {{ end }}
        {{ with .Params.subheading }}
          <p class="mt-5 {{ if $isStacked }}max-w-4xl{{ else }}max-w-xl{{ end }} text-lg leading-8 text-deep/70">{{ . }}</p>
        {{ end }}
      </div>

      <div class="space-y-4">
        {{ range .Params.items }}
          <details data-faq-item class="group rounded-[1.75rem] border border-deep/8 bg-white p-6 shadow-[0_24px_70px_-56px_rgba(6,47,73,0.32)]">
            <summary class="flex cursor-pointer list-none items-start justify-between gap-5 text-left [&::-webkit-details-marker]:hidden">
              <span class="text-lg font-extrabold tracking-[-0.02em] text-deep">{{ .question }}</span>
              <span class="mt-0.5 inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-ocean-soft text-ocean transition group-open:rotate-45 group-open:bg-ocean group-open:text-white">
                <span class="text-2xl leading-none">+</span>
              </span>
            </summary>
            <div data-faq-panel class="overflow-hidden">
              <p class="pt-4 max-w-3xl text-base leading-7 text-deep/70">{{ .answer | safeHTML }}</p>
            </div>
          </details>
        {{ end }}
      </div>
    </div>
  </div>
</section>
