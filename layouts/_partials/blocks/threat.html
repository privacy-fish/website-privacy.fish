<section id="{{ .Params.id | default "threat-model" }}" class="scroll-mt-32 relative overflow-hidden bg-[linear-gradient(145deg,_#062f49_0%,_#0a4166_60%,_#348ec3_140%)] py-20 text-white lg:py-24">
  <div class="absolute inset-0 opacity-40 [background-image:radial-gradient(circle,_rgba(255,255,255,0.08)_1px,_transparent_1px)] [background-size:40px_40px] [mask-image:radial-gradient(circle_at_center,_black,_transparent_75%)]"></div>
  <div class="absolute -top-16 right-12 h-56 w-56 rounded-full bg-sun/15 blur-3xl"></div>
  <div class="absolute bottom-0 -left-10 h-56 w-56 rounded-full bg-ocean/30 blur-3xl"></div>

  <div class="relative mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-3xl text-center">
      {{ with .Params.eyebrow }}
        <p class="text-[0.74rem] font-bold tracking-[0.22em] text-sun uppercase">{{ . }}</p>
      {{ end }}
      {{ with .Params.heading }}
        <h2 class="mt-4 text-4xl font-extrabold tracking-[-0.04em] sm:text-5xl">{{ . }}</h2>
      {{ end }}
      {{ with .Params.subheading }}
        <p class="mx-auto mt-5 max-w-2xl text-lg leading-8 text-white/80">{{ . }}</p>
      {{ end }}
    </div>

    <div class="mt-14 grid gap-6 md:grid-cols-2">
      {{ range .Params.items }}
        <article class="rounded-[1.9rem] border border-white/12 bg-white/7 p-7 shadow-[0_28px_80px_-48px_rgba(0,0,0,0.65)] backdrop-blur">
          <p class="text-[0.68rem] font-semibold tracking-[0.18em] text-sun uppercase">{{ .label }}</p>
          <h3 class="mt-3 text-xl font-extrabold tracking-[-0.02em]">{{ .title }}</h3>
          <p class="mt-3 text-base leading-7 text-white/80">{{ .text }}</p>
        </article>
      {{ end }}
    </div>
  </div>
</section>
