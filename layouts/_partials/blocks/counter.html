<section id="{{ .Params.id | default "counter" }}" class="scroll-mt-32 bg-white pb-8">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="grid gap-4 rounded-[2.5rem] border border-deep/8 bg-white p-4 shadow-[0_28px_80px_-56px_rgba(6,47,73,0.32)] sm:grid-cols-2 lg:grid-cols-4 lg:p-5">
      {{ range .Params.items }}
        <div class="rounded-[1.9rem] bg-mist/65 px-6 py-7">
          <p class="text-4xl font-extrabold tracking-[-0.04em] text-deep sm:text-5xl">{{ .value }}</p>
          <p class="mt-3 text-sm font-bold tracking-[0.14em] text-deep/60 uppercase">{{ .label }}</p>
        </div>
      {{ end }}
    </div>
  </div>
</section>
