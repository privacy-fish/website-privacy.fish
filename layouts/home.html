{{ define "main" }}
  {{ partial "blocks/blocks" . }}

  {{ if .Content }}
    <div class="bg-white py-16">
      <div class="mx-auto max-w-3xl px-6 lg:px-8">
        <div class="prose prose-lg prose-headings:font-display prose-headings:text-deep prose-a:text-ocean mx-auto max-w-none">
          {{ .Content }}
        </div>
      </div>
    </div>
  {{ end }}
{{ end }}
